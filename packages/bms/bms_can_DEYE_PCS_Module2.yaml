    name: "${name} ${bms_name} module ${pcs_module_id} counts of short circuit"
    id: "bms${bms_id}_${pcs_module_id}_short_circuit_count"
    state_class: 'measurement'
    accuracy_decimals: 0 
  
  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} counts of mos over temp"
    id: "bms${bms_id}_${pcs_module_id}_mos_over_temp_count"
    state_class: 'measurement'
    accuracy_decimals: 0 

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} counts of charge over current"
    id: "bms${bms_id}_${pcs_module_id}_charge_over_current_count"
    state_class: 'measurement'
    accuracy_decimals: 0   

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} counts of discharge under current"
    id: "bms${bms_id}_${pcs_module_id}_discharge_over_current_count"
    state_class: 'measurement'
    accuracy_decimals: 0 

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} counts of charge over temp"
    id: "bms${bms_id}_${pcs_module_id}_charge_over_temp_count"
    state_class: 'measurement'
    accuracy_decimals: 0 
  
  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} counts of discharge over temp"
    id: "bms${bms_id}_${pcs_module_id}_discharge_over_temp_count"
    state_class: 'measurement'
    accuracy_decimals: 0

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} voltage"
    id: "bms${bms_id}_${pcs_module_id}_voltage"
    unit_of_measurement: 'V'
    device_class: 'voltage'
    state_class: 'measurement'
    accuracy_decimals: 2   

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} current"
    id: "bms${bms_id}_${pcs_module_id}_current"
    unit_of_measurement: 'A'
    device_class: 'current'
    state_class: 'measurement'
    accuracy_decimals: 1

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} max charge current"
    id: "bms${bms_id}_${pcs_module_id}_max_charge_current"
    unit_of_measurement: 'A'
    device_class: 'current'
    state_class: 'measurement'
    accuracy_decimals: 0
  
  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} max discharge current"
    id: "bms${bms_id}_${pcs_module_id}_max_discharge_current"
    unit_of_measurement: 'A'
    device_class: 'current'
    state_class: 'measurement'
    accuracy_decimals: 0

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} SoC"
    id: "bms${bms_id}_${pcs_module_id}_soc"
    unit_of_measurement: '%'
    device_class: 'battery'
    state_class: 'measurement'
    accuracy_decimals: 1

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} SoH"
    id: "bms${bms_id}_${pcs_module_id}_soh"
    unit_of_measurement: '%'
    device_class: 'battery'
    state_class: 'measurement'
    accuracy_decimals: 1

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} max cell voltage"
    id: "bms${bms_id}_${pcs_module_id}_max_cell_voltage"
    unit_of_measurement: 'V'
    device_class: 'voltage'
    state_class: 'measurement'
    accuracy_decimals: 3    

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} min cell voltage"
    id: "bms${bms_id}_${pcs_module_id}_min_cell_voltage"
    unit_of_measurement: 'V'
    device_class: 'voltage'
    state_class: 'measurement'
    accuracy_decimals: 3
    on_value:
      then:
        - component.update: bms${bms_id}_${pcs_module_id}_imbalance 

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} imbalance"
    id: "bms${bms_id}_${pcs_module_id}_imbalance"
    unit_of_measurement: 'mV'
    device_class: 'voltage'
    state_class: 'measurement'
    accuracy_decimals: 0 
    lambda: |-
      return ((id(bms${bms_id}_${pcs_module_id}_max_cell_voltage).state - id(bms${bms_id}_${pcs_module_id}_min_cell_voltage).state)) * 1000;

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} temp max"
    id: "bms${bms_id}_${pcs_module_id}_temp_max"
    unit_of_measurement: '°C'
    device_class: 'temperature'
    state_class: 'measurement'
    accuracy_decimals: 1

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} temp min"
    id: "bms${bms_id}_${pcs_module_id}_temp_min"
    unit_of_measurement: '°C'
    device_class: 'temperature'
    state_class: 'measurement'
    accuracy_decimals: 1

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} MosMax"
    id: "bms${bms_id}_${pcs_module_id}_mosmax"
    unit_of_measurement: '°C'
    device_class: 'temperature'
    state_class: 'measurement'
    accuracy_decimals: 1

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} HeatMem"
    id: "bms${bms_id}_${pcs_module_id}_heatmem"
    unit_of_measurement: '°C'
    device_class: 'temperature'
    state_class: 'measurement'
    accuracy_decimals: 1

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} cycles"
    id: "bms${bms_id}_${pcs_module_id}_cycles"
    state_class: 'measurement'
    accuracy_decimals: 0  

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} charged"
    id: "bms${bms_id}_${pcs_module_id}_charged"
    unit_of_measurement: 'kWh'
    device_class: 'energy'
    state_class: 'total_increasing'
    accuracy_decimals: 3
    filters:
      - throttle: 1s  

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} discharged"
    id: "bms${bms_id}_${pcs_module_id}_discharged"
    unit_of_measurement: 'kWh'
    device_class: 'energy'
    state_class: 'total_increasing'
    accuracy_decimals: 3
    filters:
      - throttle: 1s
      
