  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} precharge mos state"
    id: "bms${bms_id}_${pcs_module_id}_precharge_mos_state"   

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} discharge mos state"
    id: "bms${bms_id}_${pcs_module_id}_discharge_mos_state"

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} charge mos state"
    id: "bms${bms_id}_${pcs_module_id}_charge_mos_state"

  - platform: template
    name: "${name} ${bms_name} module ${pcs_module_id} parallel finish"
    id: "bms${bms_id}_${pcs_module_id}_parallel_finish"
    
