# +---------------------------------------------------------+
# | Display Timeout                                         |
# +---------------------------------------------------------+

globals:
  - id: slider_updating
    type: bool
    restore_value: false
    initial_value: 'false'

number:
  - platform: template
    id: display_timeout_day
    device_id: ${board_id}
    name: "Display timeout (day)"
    optimistic: true
    unit_of_measurement: "min"
    initial_value: 5
    restore_value: true
    min_value: 0
    max_value: 60
    step: 1
    mode: box
    entity_category: config
    on_value:
      - lambda: 'id(slider_updating) = true;'
      - lvgl.slider.update:
          id: sld_timeout_day
          value: !lambda 'return (int)x;'
      - lvgl.label.update:
          id: lbl_set_timeout_day
          text: !lambda |-
            if (x == 0) return std::string("OFF");
            return to_string((int)x) + " min";
      - lambda: 'id(slider_updating) = false;'
  - platform: template
    id: display_timeout_night
    device_id: ${board_id}
    name: "Display timeout (night)"
    optimistic: true
    unit_of_measurement: "min"
    initial_value: 1
    restore_value: true
    min_value: 0
    max_value: 30
    step: 1
    mode: box
    entity_category: config
    on_value:
      - lambda: 'id(slider_updating) = true;'
      - lvgl.slider.update:
          id: sld_timeout_night
          value: !lambda 'return (int)x;'
      - lvgl.label.update:
          id: lbl_set_timeout_night
          text: !lambda |-
            if (x == 0) return std::string("OFF");
            return to_string((int)x) + " min";
      - lambda: 'id(slider_updating) = false;'
  - platform: template
    id: display_day_start
    device_id: ${board_id}
    name: "Display day start (hour)"
    optimistic: true
    unit_of_measurement: "h"
    initial_value: 7
    restore_value: true
    min_value: 5
    max_value: 10
    step: 1
    mode: box
    entity_category: config
    on_value:
      - lambda: 'id(slider_updating) = true;'
      - lvgl.slider.update:
          id: sld_day_start
          value: !lambda 'return (int)x;'
      - lvgl.label.update:
          id: lbl_set_day_start
          text: !lambda |-
            char buf[8]; snprintf(buf, sizeof(buf), "%02d:00", (int)x); return buf;
      - lambda: 'id(slider_updating) = false;'
  - platform: template
    id: display_night_start
    device_id: ${board_id}
    name: "Display night start (hour)"
    optimistic: true
    unit_of_measurement: "h"
    initial_value: 22
    restore_value: true
    min_value: 18
    max_value: 23
    step: 1
    mode: box
    entity_category: config
    on_value:
      - lambda: 'id(slider_updating) = true;'
      - lvgl.slider.update:
          id: sld_night_start
          value: !lambda 'return (int)x;'
      - lvgl.label.update:
          id: lbl_set_night_start
          text: !lambda |-
            char buf[8]; snprintf(buf, sizeof(buf), "%02d:00", (int)x); return buf;
      - lambda: 'id(slider_updating) = false;'

# +---------------------------------------------------------+
# | Touch Screen actions                                    |
# +---------------------------------------------------------+

touchscreen:
  - platform: gt911
    id: !extend my_touchscreen
    on_release: # when the finger leaves the screen surface
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: backlight

substitutions:
  row1_y: 0
  row2_y: 165
  row3_y: 270
  row4_y: 320
  
# +---------------------------------------------------------+
# | LVGL Configuration                                      |
# +---------------------------------------------------------+
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen

  on_idle:
    timeout: !lambda |-
      time_t now = ::time(nullptr); int hour = ::localtime(&now)->tm_hour;
      bool is_day = (hour >= (int)id(display_day_start).state &&
                     hour <  (int)id(display_night_start).state);
      float t = is_day ? id(display_timeout_day).state : id(display_timeout_night).state;
      return t == 0 ? 0 : (uint32_t)(t * 60000);
    then:
      - light.turn_off: backlight
      - lvgl.pause:

  # Global style defaults
  theme:
    label:
      text_color: ${color_1}
    obj:
      pad_all: 0
      scrollbar_mode: "off"

  pages:
    - id: page_main
      bg_color: ${color_bg}
      widgets:
        - tabview:
            id: tabview_main
            x: 0
            y: 0
            width: 800
            height: 480
            bg_color: ${color_bg}
            size: 5%
            position: BOTTOM
            tab_style:
              bg_color: ${color_panel}
              border_width: 1
              border_color: ${color_3}
              radius: 0
              #text_font: font_18
              text_color: ${color_2}
            tabs:
                # ┌─────────────────────────────────────────────────────┐
                # │ PAGE 1 — BATTERY                                    │
                # └─────────────────────────────────────────────────────┘
