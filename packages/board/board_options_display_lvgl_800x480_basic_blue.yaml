                                    text_color: ${color_2}
                                - label:
                                    id: lbl_set_day_start
                                    x: 0
                                    y: 10
                                    width: 100%
                                    text: "07:00"
                                    text_font: font_14
                                    text_color: ${color_6}
                                    text_align: RIGHT
                                - slider:
                                    id: sld_day_start
                                    x: 10
                                    y: 45
                                    width: 740
                                    height: 16
                                    min_value: 5
                                    max_value: 10
                                    value: 7
                                    indicator:
                                      bg_color: ${color_6}
                                    knob:
                                      bg_color: ${color_6}
                                    on_value:
                                      - lvgl.label.update:
                                          id: lbl_set_day_start
                                          text: !lambda |-
                                            char buf[8];
                                            snprintf(buf, sizeof(buf), "%02d:00", (int)x);
                                            return buf;
                                      - if:
                                          condition:
                                            lambda: 'return !id(slider_updating);'
                                          then:
                                            - number.set:
                                                id: display_day_start
                                                value: !lambda 'return x;'

                            # Night start
                            - obj:
                                width: 100%
                                height: 80
                                bg_color: ${color_panel}
                                border_width: 1
                                border_color: ${color_3}
                                radius: 6
                                pad_all: 0
                                scrollbar_mode: "off"
                                widgets:
                                - label:
                                    x: 10
                                    y: 10
                                    text: "Night start"
                                    text_font: font_14
                                    text_color: ${color_2}
                                - label:
                                    id: lbl_set_night_start
                                    x: 0
                                    y: 10
                                    width: 100%
                                    text: "22:00"
                                    text_font: font_14
                                    text_color: ${color_5}
                                    text_align: RIGHT
                                - slider:
                                    id: sld_night_start
                                    x: 10
                                    y: 45
                                    width: 740
                                    height: 16
                                    min_value: 18
                                    max_value: 23
                                    value: 22
                                    indicator:
                                      bg_color: ${color_5}
                                    knob:
                                      bg_color: ${color_5}
                                    on_value:
                                      - lvgl.label.update:
                                          id: lbl_set_night_start
                                          text: !lambda |-
                                            char buf[8];
                                            snprintf(buf, sizeof(buf), "%02d:00", (int)x);
                                            return buf;
                                      - if:
                                          condition:
                                            lambda: 'return !id(slider_updating);'
                                          then:
                                            - number.set:
                                                id: display_night_start
                                                value: !lambda 'return x;'

esphome:
  on_boot:
    priority: -100  # after LVGL is ready — sync sliders from restored number values
    then:
      - lambda: 'id(slider_updating) = true;'
      - lvgl.slider.update:
          id: sld_timeout_day
          value: !lambda 'return (int)id(display_timeout_day).state;'
      - lvgl.label.update:
          id: lbl_set_timeout_day
          text: !lambda |-
            float x = id(display_timeout_day).state;
            if (x == 0) return std::string("OFF");
            return to_string((int)x) + " min";
      - lvgl.slider.update:
          id: sld_timeout_night
          value: !lambda 'return (int)id(display_timeout_night).state;'
      - lvgl.label.update:
          id: lbl_set_timeout_night
          text: !lambda |-
            float x = id(display_timeout_night).state;
            if (x == 0) return std::string("OFF");
            return to_string((int)x) + " min";
      - lvgl.slider.update:
          id: sld_day_start
          value: !lambda 'return (int)id(display_day_start).state;'
      - lvgl.label.update:
          id: lbl_set_day_start
          text: !lambda |-
            char buf[8]; snprintf(buf, sizeof(buf), "%02d:00", (int)id(display_day_start).state); return buf;
      - lvgl.slider.update:
          id: sld_night_start
          value: !lambda 'return (int)id(display_night_start).state;'
      - lvgl.label.update:
          id: lbl_set_night_start
          text: !lambda |-
            char buf[8]; snprintf(buf, sizeof(buf), "%02d:00", (int)id(display_night_start).state); return buf;
      - lambda: 'id(slider_updating) = false;'