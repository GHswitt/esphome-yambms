# +---------------------------------------------------------+
# | Pages  : Page 1 = Battery | Page 2 = Status             |
# +---------------------------------------------------------+

# +---------------------------------------------------------+
# | Fonts                                                   |
# +---------------------------------------------------------+
font:
  - file: "gfonts://Montserrat"
    id: font_14
    size: 14
    bpp: 4
    extras:
      - file: "fonts/materialdesignicons-webfont.ttf"
        glyphs: [
          "\U000F0E05", # thermometer-plus
          "\U000F0E04", # thermometer-minus
          ]
  - file: "gfonts://Montserrat"
    id: font_18
    size: 18
    bpp: 4
    glyphs: "!\"%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~ °↑↓"
    extras:
      - file: "fonts/materialdesignicons-webfont.ttf"
        glyphs: [
          "\U000F17E0", # battery-arrow-up
          "\U000F17DF", # battery-arrow-down-outline
          "\U000F01C2", # delta
          "\U000F05D1", # scale-balance
          ]
  - file: "gfonts://Montserrat"
    id: font_22
    size: 22
    bpp: 4
    extras:
      - file: "fonts/materialdesignicons-webfont.ttf"
        glyphs: [
          "\U000F17E0", # battery-arrow-up
          "\U000F17DF", # battery-arrow-down-outline
          "\U000F01C2", # delta
          "\U000F05D1", # scale-balance
          "\U000F0E05", # thermometer-plus
          "\U000F0E04", # thermometer-minus
          ]
  - file: "gfonts://Montserrat"
    id: font_28
    size: 28
    bpp: 4
  - file: "gfonts://Montserrat"
    id: font_40
    size: 40
    bpp: 4

# +---------------------------------------------------------+
# | Display Timeout                                         |
# +---------------------------------------------------------+

number:
  - platform: template
    id: display_timeout
    device_id: ${board_id}
    name: "Display timeout"
    optimistic: true
    unit_of_measurement: "s"
    initial_value: 600
    restore_value: true
    min_value: 5
    max_value: 600
    step: 5
    mode: box
    entity_category: config

# +---------------------------------------------------------+
# | Touch Screen actions                                    |
# +---------------------------------------------------------+

touchscreen:
  - platform: gt911
    id: !extend my_touchscreen
    on_release: # when the finger leaves the screen surface
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: backlight

substitutions:
  row1_y: 0
  row2_y: 165
  row3_y: 270
  row4_y: 320
  
# +---------------------------------------------------------+
# | LVGL Configuration                                      |
# +---------------------------------------------------------+
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen

  on_idle:
    timeout: !lambda "return (id(display_timeout).state * 1000);"
    then:
      - light.turn_off: backlight
      - lvgl.pause:

  # Global style defaults
  theme:
    label:
      text_color: ${color_1}
    obj:
      pad_all: 0
      scrollbar_mode: "off"

  pages:
    - id: page_main
      bg_color: ${color_bg}
      widgets:
        - tabview:
            id: tabview_main
            x: 0
            y: 0
            width: 800
            height: 480
            bg_color: ${color_bg}
            size: 5%
            position: BOTTOM
            tab_style:
              bg_color: ${color_panel}
              border_width: 1
              border_color: ${color_3}
              radius: 0
              #text_font: font_18
              text_color: ${color_2}
            tabs:
                # ┌─────────────────────────────────────────────────────┐
                # │ PAGE 1 — BATTERY                                    │
                # └─────────────────────────────────────────────────────┘
              - name: Battery
                bg_color: ${color_bg}
                widgets:
                    # ── ROW 1 : Faults Status | Battery SoC | Charge Status ────────

                    # Faults Status
                    - obj:
                        x: 0
                        y: ${row1_y}
                        width: 245
                        height: 150
                        bg_color: ${color_panel}
                        border_width: 1
                        border_color: ${color_3}
                        radius: 8
                        pad_all: 0
                        scrollbar_mode: "off"
                        widgets:
                        - label:
                            x: 0
                            y: 5
                            width: 100%
                            text: "Faults Status"
                            text_font: font_14
                            text_color: ${color_2}
                            text_align: CENTER
                        
                        # Row 1
                        - obj:
                            id: net_network
                            x: 15
                            y: 30
                            width: 100
                            height: 20
                            bg_color: ${color_4}
                            border_width: 0
                            radius: 4
                            scrollbar_mode: "off"
                            widgets:
                                - label:
                                    width: 100%
                                    text: "IP Network"
                                    text_font: font_14
                                    text_color: ${color_bg}
                                    text_align: CENTER
                        - obj:
                            id: net_api_mqtt
                            x: 125
                            y: 30
                            width: 100
                            height: 20
                            bg_color: ${color_4}
                            border_width: 0
                            radius: 4
                            scrollbar_mode: "off"
                            widgets:
                                - label:
                                    width: 100%
                                    text: "API/MQTT"
                                    text_font: font_14
                                    text_color: ${color_bg}
                                    text_align: CENTER
                                        
                        # Row 2
                        - obj:
                            id: net_can_inv
                            x: 15
                            y: 60
                            width: 100
                            height: 20
                            bg_color: ${color_4}
                            border_width: 0
                            radius: 4
                            scrollbar_mode: "off"
                            widgets:
                                - label:
                                    width: 100%
                                    text: "CAN INV"
                                    text_font: font_14
                                    text_color: ${color_bg}
                                    text_align: CENTER
                        #   - obj:
                        #       id: net_rs485_inv
                        #       x: 125
                        #       y: 60
                        #       width: 100
                        #       height: 20
                        #       bg_color: ${color_4}
                        #       border_width: 0
                        #       radius: 4
                        #       scrollbar_mode: "off"
                        #       widgets:
                        #         - label:
                        #             width: 100%
                        #             text: "RS485 INV"
                        #             text_font: font_14
                        #             text_color: ${color_bg}
                        #             text_align: CENTER
                        
                        # Row 3
                        - obj:
                            id: bg_bms
                            x: 15
                            y: 90
                            width: 100
                            height: 20
                            bg_color: ${color_4}
                            border_width: 0
                            radius: 4
                            scrollbar_mode: "off"
                            widgets:
                                - label:
                                    width: 100%
                                    text: "BMS"
                                    text_font: font_14
                                    text_color: ${color_bg}
                                    text_align: CENTER
                        - obj:
                            id: bg_shunt
                            x: 125
                            y: 90
                            width: 100
                            height: 20
                            bg_color: ${color_4}
                            border_width: 0
                            radius: 4
                            scrollbar_mode: "off"
                            widgets:
                                - label:
                                    width: 100%
                                    text: "Shunt"
                                    text_font: font_14
                                    text_color: ${color_bg}
                                    text_align: CENTER

                        # Row 4
                        - obj:
                            id: bg_balancer
                            x: 15
                            y: 120
                            width: 100
                            height: 20
                            bg_color: ${color_4}
                            border_width: 0
                            radius: 4
                            scrollbar_mode: "off"
                            widgets:
                                - label:
                                    width: 100%
                                    text: "Balancer"
                                    text_font: font_14
                                    text_color: ${color_bg}
                                    text_align: CENTER
                        - obj:
                            id: bg_alarm
                            x: 125
                            y: 120
                            width: 100
                            height: 20
                            bg_color: ${color_4}
                            border_width: 0
                            radius: 4
                            scrollbar_mode: "off"
                            widgets:
                                - label:
                                    width: 100%
                                    text: "Alarm"
                                    text_font: font_14
                                    text_color: ${color_bg}
                                    text_align: CENTER

                    # Battery SoC
                    - obj:
                        x: 255
                        y: ${row1_y}
                        width: 250
                        height: 150
                        bg_color: ${color_panel}
                        border_width: 1
                        border_color: ${color_3}
                        radius: 8
                        pad_all: 0
                        scrollbar_mode: "off"
                        widgets:
                        - label:
                            x: 0
                            y: 5
                            width: 100%
                            text: "Battery SoC"
                            text_font: font_14
                            text_color: ${color_2}
                            text_align: CENTER

                        # Terminal +
                        - obj:
                            x: 60
                            y: 30
                            width: 10
                            height: 5
                            bg_color: ${color_2}
                            border_width: 0
                            radius: 1
                            scrollbar_mode: "off"

                        # Battery
                        - obj:
                            x: 40
                            y: 35
                            width: 50
                            height: 100
                            bg_color: ${color_3}
                            border_width: 2
                            border_color: ${color_2}
                            radius: 4
                            pad_all: 0
                            scrollbar_mode: "off"
                            widgets:
                                # SoC
                                - obj:
                                    id: battery_fill_soc
                                    x: 0
                                    y: 0
                                    width: 100%
                                    height: 0 # SoC %
                                    bg_color: ${color_6}
                                    border_width: 0
                                    radius: 2
                                    align: BOTTOM_LEFT
                                    scrollbar_mode: "off"
                        
                        # SoC text value
                        - label:
                            id: lbl_soc_value
                            x: 120
                            y: 40
                            width: 100
                            text: "---%"
                            text_font: font_40
                            text_color: ${color_1}

                        # Capacity
                        - label:
                            id: lbl_capacity
                            x: 100
                            y: 94
                            width: 50%
                            recolor: true
                            text: "--- / --- Ah"
                            text_font: font_18
                            text_color: ${color_1}
                            text_align: CENTER

                        # Installed capacity
                        - label:
                            id: lbl_installed_capacity
                            x: 100
                            y: 120
                            width: 50%
                            text: "Installed: --- Ah"
                            text_font: font_14
                            text_color: ${color_6}
                            text_align: CENTER

                    # Requested Values to Inverter
                    - obj:
                        x: 515
                        y: ${row1_y}
                        width: 245
                        height: 150
                        bg_color: ${color_panel}
                        border_width: 1
                        border_color: ${color_3}
                        radius: 6
                        widgets:
                        - label:
                            x: 0
                            y: 5
                            width: 100%
                            text: "Requested Values to Inverter"
                            text_font: font_14
                            text_color: ${color_2}
                            text_align: CENTER
                        # CVL
                        - label:
                            x: 15
                            y: 30
                            width: 50
                            text: "CVL :"
                            text_font: font_18
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_req_cvl
                            x: 75
                            y: 30
                            width: 60
                            text: "--.- V"
                            text_font: font_18
                            text_color: ${color_5}
                        # CVL instruction
                        - label:
                            id: lbl_cvl_instruction
                            x: 145
                            y: 30
                            width: 90
                            text: "---"
                            text_font: font_18
                            text_color: ${color_4}
                        # CCL
                        - label:
                            x: 15
                            y: 60
                            width: 50
                            text: "CCL :"
                            text_font: font_18
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_req_ccl
                            x: 75
                            y: 60
                            width: 60
                            text: "--- A"
                            text_font: font_18
                            text_color: ${color_5}
                        # CCL Derating
                        - label:
                            id: lbl_ccl_derating
                            x: 145
                            y: 60
                            width: 90
                            text: "---"
                            text_font: font_18
                            text_color: ${color_7}
                        # DCL
                        - label:
                            x: 15
                            y: 90
                            width: 50
                            text: "DCL :"
                            text_font: font_18
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_req_dcl
                            x: 75
                            y: 90
                            width: 60
                            text: "--- A"
                            text_font: font_18
                            text_color: ${color_5}
                        # DCL Derating
                        - label:
                            id: lbl_dcl_derating
                            x: 145
                            y: 90
                            width: 90
                            text: "---"
                            text_font: font_18
                            text_color: ${color_4}
                        # DVL
                        - label:
                            x: 15
                            y: 120
                            width: 50
                            text: "DVL :"
                            text_font: font_18
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_req_dvl
                            x: 75
                            y: 120
                            width: 60
                            text: "--.- V"
                            text_font: font_18
                            text_color: ${color_5}
                        # DVL instruction
                        - label:
                            id: lbl_dvl_instruction
                            x: 145
                            y: 120
                            width: 90
                            text: "---"
                            text_font: font_18
                            text_color: ${color_4}

                    # ── ROW 2 : Voltage | Power | Current ───
                    # Voltage
                    - obj:
                        x: 0
                        y: ${row2_y}
                        width: 245
                        height: 90
                        bg_color: ${color_panel}
                        border_width: 1
                        border_color: ${color_3}
                        radius: 8
                        pad_all: 0
                        scrollbar_mode: "off"
                        widgets:
                        - label:
                            x: 0
                            y: 5
                            width: 100%
                            text: "VOLTAGE"
                            text_font: font_14
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_voltage
                            x: 0
                            y: 30
                            width: 100%
                            text: "--.- V"
                            text_font: font_40
                            text_color: ${color_1}
                            text_align: CENTER

                    # Current
                    - obj:
                        x: 255
                        y: ${row2_y}
                        width: 250
                        height: 150
                        bg_color: ${color_panel}
                        border_width: 1
                        border_color: ${color_3}
                        radius: 8
                        pad_all: 0
                        scrollbar_mode: "off"
                        widgets:
                        - label:
                            x: 0
                            y: 5
                            width: 100%
                            text: "CURRENT"
                            text_font: font_14
                            text_color: ${color_2}
                            text_align: CENTER
                        # Gauge
                        - meter:
                            y: 10
                            height: 110
                            width: 240
                            border_width: 0
                            bg_opa: TRANSP
                            align: CENTER
                            indicator:
                              bg_opa: TRANSP
                            scales:
                            - range_from: -225
                              range_to: 225
                              angle_range: 180 # sets the total angle to 180 = starts mid left and ends mid right
                              ticks:
                                count: 0
                              indicators:
                                - line:
                                    id: meter_current_needle
                                    color: ${color_4}
                                    width: 8
                                    r_mod: 12 # sets line length by this much difference from the scale default radius
                                    value: 0
                                - arc: # Red range
                                    color: ${color_7}
                                    r_mod: 10 # radius difference from the scale default radius
                                    width: 31
                                    start_value: -225
                                    end_value: -120
                                - arc: # Yellow range
                                    color: ${color_6}
                                    r_mod: 10
                                    width: 31
                                    start_value: -120
                                    end_value: 0
                                - arc: # green range
                                    color: ${color_5}
                                    r_mod: 10
                                    width: 31
                                    start_value: 0
                                    end_value: 225
                        - obj: # to cover the middle part of meter indicator line
                            align: CENTER
                            y: 75  # match meter's y offset
                            width: 166   # adjust to cover inner area up to where arcs start
                            height: 166  # same as width for a circle
                            border_width: 0
                            radius: 100   # half of width/height = perfect circle
                            bg_color: ${color_panel}  # match your meter background color
                            #bg_color: 0x000000
                            bg_opa: COVER
                        - label: # gauge numeric indicator
                            id: meter_current_text
                            text_font: font_40
                            align: CENTER
                            y: 45
                            text: "0 A"
                        # - label: # lower range indicator
                        #     text_font: font_18
                        #     align: CENTER
                        #     y: 50
                        #     x: -90
                        #     text: "-225 A"
                        # - label: # higher range indicator
                        #     text_font: font_18
                        #     align: CENTER
                        #     y: 50
                        #     x: 90
                        #     text: "+225 A"

                    # Power
                    - obj:
                        x: 515
                        y: ${row2_y}
                        width: 245
                        height: 90
                        bg_color: ${color_panel}
                        border_width: 1
                        border_color: ${color_3}
                        radius: 8
                        pad_all: 0
                        scrollbar_mode: "off"
                        widgets:
                        - label:
                            x: 0
                            y: 5
                            width: 100%
                            text: "POWER"
                            text_font: font_14
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_power
                            x: 0
                            y: 30
                            width: 100%
                            text: "--- W"
                            text_font: font_40
                            text_color: ${color_1}
                            text_align: CENTER

                    # SoH
                    - obj:
                        x: 255
                        y: 330
                        width: 250
                        height: 60
                        bg_color: ${color_panel}
                        border_width: 1
                        border_color: ${color_3}
                        radius: 6
                        widgets:
                        - label:
                            x: 0
                            y: 5
                            width: 100%
                            text: "Battery SoH"
                            text_font: font_14
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_soh
                            x: 0
                            y: 30
                            width: 100%
                            text: "--- %"
                            text_font: font_18
                            text_color: ${color_5}
                            text_align: CENTER

                    # ── ROW 3 : Cell voltages + Delta + Temperatures ──
                    # Cell voltages
                    - obj:
                        x: 0
                        y: ${row3_y}
                        width: 245
                        height: 120
                        bg_color: ${color_panel}
                        border_width: 1
                        border_color: ${color_3}
                        radius: 6
                        layout:
                          type: FLEX
                          flex_flow: ROW_WRAP
                          flex_align_cross: CENTER
                          pad_row: 2
                          pad_column: 0
                        widgets:
                        - label:
                            width: 100%
                            height: 20
                            text: "Cell voltages"
                            text_font: font_14
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_max_cell_num
                            width: 30%
                            text: "---"
                            text_font: font_22
                            text_color: ${color_2}
                            text_align: RIGHT
                        - label:
                            y: 4
                            width: 10%
                            text: "\U000F17E0"
                            text_font: font_22
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_max_cell_v
                            width: 50%
                            text: "-.--- V"
                            text_font: font_22
                            text_color: ${color_7}
                            text_align: CENTER
                        - label:
                            id: lbl_min_cell_num
                            width: 30%
                            text: "---"
                            text_font: font_22
                            text_color: ${color_2}
                            text_align: RIGHT
                        - label:
                            y: 4
                            width: 10%
                            text: "\U000F17DF"
                            text_font: font_22
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_min_cell_v
                            width: 50%
                            text: "-.--- V"
                            text_font: font_22
                            text_color: ${color_4}
                            text_align: CENTER
                        - label:
                            id: lbl_equalizing
                            width: 40%
                            text: "Delta"
                            text_font: font_22
                            text_color: ${color_2}
                            text_align: RIGHT
                        - label:
                            id: lbl_delta_cell
                            width: 50%
                            text: "--- mV"
                            text_font: font_22
                            text_color: ${color_5}
                            text_align: CENTER
                        

                    # Max/Min Temperature
                    - obj:
                        x: 515
                        y: ${row3_y}
                        width: 245
                        height: 120
                        bg_color: ${color_panel}
                        border_width: 1
                        border_color: ${color_3}
                        radius: 6
                        layout:
                          type: FLEX
                          flex_flow: ROW_WRAP
                          flex_align_cross: CENTER
                          pad_row: 2
                          pad_column: 0
                        widgets:
                        - label:
                            height: 20
                            width: 100%
                            text: "Temperature"
                            text_font: font_14
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_max_temp
                            width: 45%
                            text: "↑ ---°C"
                            text_font: font_22
                            text_color: ${color_7}
                            text_align: CENTER
                        - label:
                            id: lbl_min_temp
                            width: 45%
                            text: "↓ ---°C"
                            text_font: font_22
                            text_color: ${color_4}
                            text_align: CENTER
                        - label:
                            id: lbl_max_temp_sensor
                            width: 45%
                            text: "Sensor ---"
                            text_font: font_14
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_min_temp_sensor
                            width: 45%
                            text: "Sensor ---"
                            text_font: font_14
                            text_color: ${color_2}
                            text_align: CENTER



                # ┌─────────────────────────────────────────────────────┐
                # │ PAGE 2 — STATUS                                     │
                # └─────────────────────────────────────────────────────┘
              - name: Status
                widgets:
                    # ── ROW 1 : Charging status | Charge instruction | Discharge instruction | Last Complete Charge ──
                    # Charging status
                    - obj:
                        x: 10
                        y: 5
                        width: 178
                        height: 60
                        bg_color: ${color_panel}
                        border_width: 1
                        border_color: ${color_3}
                        radius: 6
                        widgets:
                        - label:
                            x: 0
                            y: 5
                            width: 100%
                            text: "Charging status"
                            text_font: font_14
                            text_color: ${color_2}
                            text_align: CENTER
                        - label:
                            id: lbl_charging_status
                            x: 0
                            y: 30
                            width: 100%
                            text: "---"
                            text_font: font_18
                            text_color: ${color_5}
                            text_align: CENTER

                    # Charge instruction
                    - obj:
                        x: 208
                        y: 5
                        width: 178
                        height: 60
                        bg_color: ${color_panel}
