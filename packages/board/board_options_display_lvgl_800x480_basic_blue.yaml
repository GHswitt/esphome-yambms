                        bg_color: ${color_bg}
                        border_width: 0
                        pad_all: 0
                        scrollbar_mode: "off"
                        layout:
                          type: FLEX
                          flex_flow: ROW_WRAP
                          flex_align_main: START
                          flex_align_cross: START
                          pad_row: 5
                        widgets:
