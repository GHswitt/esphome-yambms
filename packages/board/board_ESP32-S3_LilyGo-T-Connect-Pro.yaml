# https://github.com/Xinyuan-LilyGO/T-Connect

substitutions:
  board_chip: "ESP32-S3"
  board_name: "LilyGo T-Connect Pro"

packages:
  device_base: !include ../base/device_base.yaml
  device_base_wifi: !include ../base/device_base_wifi.yaml
  #device_base_ethernet: !include ../base/device_base_ethernet.yaml
  device_cpu_freq_240: !include board_options_cpu_freq_240_esp32-s3.yaml
  display: !include board_options_display_480x222.yaml
  # psram: !include board_options_psram_settings.yaml

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB # ajust according to your ESP32-S3 version
  framework:
    type: esp-idf

esphome:
  platformio_options:
    board_build.flash_mode: dio             # use Dual IO (dio) instead of Quad IO (qio) to prevent boot loop after flashing

# PSRAM activation with default options
# psram:
#   mode: octal
#   speed: 80MHz

wifi:
  id: my_network
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: !secret domain
  ap:

# ESPHome does not support W5500 and other SPI devices at the same SPI bus:
# https://github.com/esphome/esphome/discussions/6720
#ethernet:
#  id: my_network
#  type: W5500
#  clk_pin: 12
#  mosi_pin: 11
#  miso_pin: 13
#  cs_pin: 10
#  interrupt_pin: 9
#  reset_pin: 48
#  clock_speed: 40MHz
  
logger:
  baud_rate: 0 # frees the 3rd UART and avoids some bugs like "WK2168 with canbus" or "BLE client with RS485 modbus"
  hardware_uart: USB_SERIAL_JTAG

uart:
  # UART 0 : USB UART port used for ESP32 flashing and logs, can be released if necessary (tx_pin: 43, rx_pin: 44)
  # UART 1 : RS232
  - id: uart_esp_1
    tx_pin: 4
    rx_pin: 5
    baud_rate: 115200
    rx_buffer_size: 512
  # UART 2 : RS485
  - id: uart_esp_2
    tx_pin: 17
    rx_pin: 18
    baud_rate: 115200
    rx_buffer_size: 512
  # UART 3
  #- id: uart_esp_3
  #  tx_pin: 17
  #  rx_pin: 18
  #  baud_rate: 115200
  #  rx_buffer_size: 512

canbus:
  # CANBUS NODE 1
  - platform: esp32_can
    id: canbus_node1
    tx_pin: 6 # TWAI_TX
    rx_pin: 7 # TWAI_RX
    can_id: 1
    bit_rate: 500kbps

# SPI for ethernet/LCD/LoRa
spi:
  - id: lilygo_spi_bus
    clk_pin: 12
    mosi_pin: 11
    miso_pin: 13

# I2C for touch controller CST226SE
i2c:
  sda: 39
  scl: 40

touchscreen:
  - platform: cst226
    id: my_touchscreen
    interrupt_pin: 3
    reset_pin: 47
    
display:
  # T-Connect-Pro display
  # https://esphome.io/components/display/ili9xxx
  - platform: ili9xxx
    spi_id: lilygo_spi_bus
    id: my_display
    model: ST7796
    cs_pin: 21
    dc_pin: 41
    dimensions:
      height: 222
      width: 480
      offset_height: 2
      offset_width: 1
    invert_colors: false
    color_palette: 8BIT
    update_interval: 1s
    data_rate: 40Mhz

# Define a PWM output for the display backlight
output:
  - platform: ledc
    pin: 46
    id: backlight_pwm
    
# ESP32 board without LED
  - platform: template
    id: esp_output
    type: binary
    write_action:
      - logger.log: "Inverter Heartbeat Output"
      #- lambda: C++ code; # action to be performed at each inverter heartbeat

# Define a monochromatic, dimmable light for the backlight
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

  # ESP Light used to see the inverter heartbeat
  # Internal : only specifying an id without a name will implicitly set this to true.
  - platform: binary
    id: esp_light
    output: esp_output


# Relay: IO8